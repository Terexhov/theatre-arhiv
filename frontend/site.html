<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Эдуард Бояков</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1a1a'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='20' fill='%23f9f7f4'>Б</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --ink-light: #555;
      --ink-muted: #888;
      --rule: #e0ddd8;
      --bg: #f9f7f4;
      --bg-card: #fff;
      --accent: #1a1a1a;
    }

    body { font-family: Georgia, 'Times New Roman', serif; background: var(--bg); color: var(--ink); font-size: 16px; line-height: 1.7; }

    /* ========= ШАПКА ========= */
    .site-header {
      background: var(--ink); color: #f9f7f4;
      border-bottom: 3px solid #333;
    }
    .site-header-inner {
      max-width: 1060px; margin: 0 auto;
      padding: 2.8rem 2rem 2rem;
    }
    .site-header h1 {
      font-size: 2.8rem; font-weight: normal;
      letter-spacing: 0.02em; line-height: 1.1;
      margin-bottom: 0.4rem;
    }
    .site-header .tagline {
      font-size: 0.8rem; font-family: sans-serif;
      letter-spacing: 0.14em; text-transform: uppercase;
      opacity: 0.45;
    }

    /* ========= НАВИГАЦИЯ ========= */
    .toc-nav {
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.1);
      position: sticky; top: 0; z-index: 100;
      overflow-x: auto;
    }
    .toc-nav-inner {
      max-width: 1060px; margin: 0 auto;
      display: flex;
    }
    .toc-link {
      padding: 0.65rem 1rem; font-size: 0.72rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      font-family: sans-serif; color: rgba(255,255,255,0.45);
      cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }
    .toc-link:hover { color: rgba(255,255,255,0.85); }
    .toc-link.active { color: #fff; border-bottom-color: #fff; }

    /* ========= ОСНОВНОЙ КОНТЕНТ ========= */
    .page-body {
      max-width: 1060px; margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 3rem;
      align-items: start;
    }

    /* ========= ИНФОБОКС (правая колонка) ========= */
    .infobox {
      background: var(--bg-card);
      border: 1px solid var(--rule);
      position: sticky; top: 52px;
    }
    .infobox-photo {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; display: block;
      background: #eee;
    }
    .infobox-photo-placeholder {
      width: 100%; aspect-ratio: 3/4;
      background: #e8e5e0;
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 0.78rem; font-family: sans-serif;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .infobox-body { padding: 1.1rem 1.2rem; }
    .infobox-name {
      font-size: 1rem; font-weight: normal;
      margin-bottom: 0.75rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--rule);
    }
    .info-row { display: flex; gap: 0.75rem; margin-bottom: 0.55rem; font-size: 0.82rem; }
    .info-row dt { color: var(--ink-muted); font-family: sans-serif; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; min-width: 70px; padding-top: 0.1rem; }
    .info-row dd { flex: 1; line-height: 1.5; }

    /* ========= ЛЕВАЯ КОЛОНКА — КОНТЕНТ ========= */
    .main-col {}

    /* Лид (первый абзац) */
    .lead-text {
      font-size: 1.05rem; line-height: 1.8;
      color: var(--ink); margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule);
    }
    .lead-text p + p { margin-top: 0.85rem; }

    /* Раздел */
    .section { margin-bottom: 2.5rem; }
    .section-heading {
      font-size: 1.3rem; font-weight: normal;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid var(--ink);
      margin-bottom: 1.25rem;
      display: flex; align-items: baseline; gap: 0.75rem;
    }
    .section-heading .section-num {
      font-size: 0.7rem; font-family: monospace;
      color: var(--ink-muted); font-weight: normal;
    }

    /* Подгруппа (напр. МХАТ, Сцена Молот) */
    .subsection { margin-bottom: 1.5rem; }
    .subsection-heading {
      font-size: 0.78rem; font-family: sans-serif;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-muted); margin-bottom: 0.65rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--rule);
    }

    /* Строка проекта */
    .project-row {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid #f0ede8;
      cursor: pointer; transition: background 0.1s;
    }
    .project-row:hover { background: #f5f3f0; margin: 0 -0.75rem; padding-left: 0.75rem; padding-right: 0.75rem; }
    .project-row:last-child { border-bottom: none; }
    .proj-year {
      font-size: 0.72rem; font-family: monospace;
      color: var(--ink-muted); min-width: 36px; flex-shrink: 0;
    }
    .proj-title { font-size: 0.97rem; flex: 1; }
    .proj-meta {
      font-size: 0.72rem; font-family: sans-serif;
      color: var(--ink-muted); white-space: nowrap;
    }

    /* Пустые разделы */
    .empty-section { color: var(--ink-muted); font-size: 0.88rem; font-family: sans-serif; font-style: italic; }

    /* ========= ДЕТАЛЬНАЯ ПАНЕЛЬ ========= */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
    .overlay.open { display: block; }
    .panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 520px; max-width: 100vw;
      background: white; overflow-y: auto; z-index: 201;
      transform: translateX(100%); transition: transform 0.25s ease;
      border-left: 1px solid var(--rule);
    }
    .panel.open { transform: translateX(0); }
    .panel-close {
      position: sticky; top: 0; background: white;
      border-bottom: 1px solid var(--rule);
      padding: 0.7rem 1.1rem; display: flex;
      justify-content: space-between; align-items: center;
    }
    .panel-close span { font-size: 0.7rem; font-family: sans-serif; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .panel-close button { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--ink-muted); }
    .panel-body { padding: 1.5rem 1.75rem 3rem; }
    .panel-body h2 { font-size: 1.35rem; font-weight: normal; margin-bottom: 0.3rem; }
    .panel-sub { font-size: 0.85rem; color: var(--ink-muted); margin-bottom: 1.25rem; font-family: sans-serif; }
    .dl-block { margin-bottom: 0.65rem; }
    .dl-block dt { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); font-family: sans-serif; margin-bottom: 0.15rem; }
    .dl-block dd { font-size: 0.9rem; }
    .panel-divider { border: none; border-top: 1px solid var(--rule); margin: 1.25rem 0; }
    .panel-section-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); font-family: sans-serif; margin-bottom: 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--rule); }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); gap: 5px; margin-top: 0.4rem; }
    .photo-thumb { cursor: pointer; overflow: hidden; border: 1px solid var(--rule); transition: border-color 0.12s; }
    .photo-thumb:hover { border-color: var(--ink); }
    .photo-thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

    /* ========= ЛАЙТБОКС ========= */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; cursor: zoom-out; }
    .lightbox-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; opacity: 0.6; }
    .lightbox-close:hover { opacity: 1; }

    /* ========= АДАПТИВ ========= */
    @media (max-width: 760px) {
      .page-body { grid-template-columns: 1fr; gap: 2rem; }
      .infobox { position: static; max-width: 280px; }
      .main-col { order: 2; }
      .infobox { order: 1; }
      .site-header h1 { font-size: 2rem; }
      .panel { width: 100vw; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <h1 id="s-title">Эдуард Бояков</h1>
    <div class="tagline" id="s-subtitle">Режиссёр · Театральный деятель</div>
  </div>
</header>

<nav class="toc-nav">
  <div class="toc-nav-inner" id="toc-nav">
    <span class="toc-link active" data-section="bio" onclick="scrollToSection('bio')">Биография</span>
  </div>
</nav>

<div class="page-body">

  <!-- Левая колонка: контент -->
  <main class="main-col">
    <div class="lead-text" id="lead-text">
      <p style="color:#aaa;font-family:sans-serif;font-size:0.9rem">Загрузка…</p>
    </div>
    <div id="sections-content"></div>
  </main>

  <!-- Правая колонка: инфобокс -->
  <aside>
    <div class="infobox">
      <div id="infobox-photo-wrap">
        <div class="infobox-photo-placeholder">Фото</div>
      </div>
      <div class="infobox-body">
        <div class="infobox-name" id="ib-name">Эдуард Бояков</div>
        <dl>
          <div class="info-row" id="ib-born-row" style="display:none">
            <dt>Дата рождения</dt>
            <dd id="ib-born"></dd>
          </div>
          <div class="info-row">
            <dt>Деятельность</dt>
            <dd id="ib-roles">Режиссёр</dd>
          </div>
        </dl>
      </div>
    </div>
  </aside>

</div>

<!-- Оверлей + Панель -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-close">
    <span id="panel-breadcrumb"></span>
    <button onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
const API = 'http://178.253.38.120/api';
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.gif','.webp','.tiff'];
const DOC_ICONS = {'фотография':'🖼','афиша':'🎭','программка':'📋','видеозапись':'🎬','рецензия':'📝','текст пьесы':'📖','договор':'📑','интервью':'🎙','лекция':'📚','публикация':'📰','концепция':'💡','черновик':'✏️','переписка':'✉️','другое':'📄'};
function isImage(p) { return p && IMAGE_EXTS.some(e => p.toLowerCase().endsWith(e)); }
function getYear(d) { return d ? new Date(d).getFullYear() : null; }

async function init() {
  const [cfg, data] = await Promise.all([
    fetch(`${API}/site/config`).then(r=>r.json()),
    fetch(`${API}/site/data`).then(r=>r.json()),
  ]);

  applyConfig(cfg);
  renderSections(data);
}

function applyConfig(cfg) {
  document.title = cfg.hero_title || 'Эдуард Бояков';
  document.getElementById('s-title').textContent = cfg.hero_title || 'Эдуард Бояков';
  document.getElementById('s-subtitle').textContent = cfg.hero_subtitle || '';
  document.getElementById('ib-name').textContent = cfg.hero_title || '';
  document.getElementById('ib-roles').textContent = cfg.hero_roles || '';

  if (cfg.hero_born) {
    document.getElementById('ib-born').textContent = cfg.hero_born;
    document.getElementById('ib-born-row').style.display = 'flex';
  }

  if (cfg.hero_photo) {
    document.getElementById('infobox-photo-wrap').innerHTML =
      `<img class="infobox-photo" src="${cfg.hero_photo}" alt="${cfg.hero_title||''}">`;
  }

  const bio = cfg.hero_bio || '';
  const leadEl = document.getElementById('lead-text');
  if (bio.trim()) {
    leadEl.innerHTML = bio.split('\n\n').map(p=>`<p>${p}</p>`).join('');
  } else {
    leadEl.innerHTML = '';
    leadEl.style.display = 'none';
  }
}

function renderSections(items) {
  // Группируем: inventory → case → items[]
  const invMap = {};
  items.forEach(p => {
    if (!invMap[p.inventory_id]) {
      invMap[p.inventory_id] = {
        id: p.inventory_id,
        title: p.inventory_title,
        num: parseInt(p.inventory_number),
        cases: {}
      };
    }
    const inv = invMap[p.inventory_id];
    if (!inv.cases[p.case_id]) {
      inv.cases[p.case_id] = {
        id: p.case_id,
        title: p.case_title,
        group: p.project_group,
        items: []
      };
    }
    inv.cases[p.case_id].items.push(p);
  });

  const inventories = Object.values(invMap).sort((a,b) => a.num - b.num);

  // Строим TOC
  const toc = document.getElementById('toc-nav');
  toc.innerHTML = `<span class="toc-link" data-section="bio" onclick="scrollToSection('bio')">Биография</span>`;
  inventories.forEach((inv, i) => {
    toc.innerHTML += `<span class="toc-link" data-section="inv-${inv.id}" onclick="scrollToSection('inv-${inv.id}')">${inv.title}</span>`;
  });

  // Строим секции
  let html = '';
  inventories.forEach((inv, secIdx) => {
    html += `<div class="section" id="inv-${inv.id}">
      <h2 class="section-heading">
        ${inv.title}
        <span class="section-num">${secIdx + 1}</span>
      </h2>`;

    const cases = Object.values(inv.cases);
    const showSubheading = cases.length > 1 || cases[0]?.title;

    cases.forEach(cs => {
      if (showSubheading) {
        html += `<div class="subsection">
          <div class="subsection-heading">${cs.title}</div>`;
      } else {
        html += `<div class="subsection">`;
      }

      cs.items.sort((a,b) => {
        const ya = getYear(a.premiere_date) || 9999;
        const yb = getYear(b.premiere_date) || 9999;
        return ya - yb;
      });

      cs.items.forEach(p => {
        const year = getYear(p.premiere_date) || '';
        if (p.item_type === 'production') {
          const meta = [p.genre, p.playwright].filter(Boolean).join(' · ');
          html += `<div class="project-row" onclick="openPanel(${p.id},'${esc(inv.title)}','${esc(cs.title)}')">
            <span class="proj-year">${year}</span>
            <span class="proj-title">«${p.title}»</span>
            ${meta ? `<span class="proj-meta">${meta}</span>` : ''}
          </div>`;
        } else {
          // document
          const isImg = p.url && /\.(jpg|jpeg|png|gif|webp)$/i.test(p.url);
          const hasFile = !!p.url;
          const clickAttr = isImg
            ? `onclick="openLightbox('${p.url}')" style="cursor:pointer"`
            : hasFile
              ? `onclick="window.open('${p.url}','_blank')" style="cursor:pointer"`
              : `style="cursor:default"`;
          html += `<div class="project-row" ${clickAttr} title="${p.title||''}">
            <span class="proj-year">${year}</span>
            ${isImg ? `<img src="${p.url}" alt="${esc(p.title||'')}" style="width:48px;height:36px;object-fit:cover;border:1px solid #e0ddd8;flex-shrink:0">` : `<span style="font-size:1.1rem;flex-shrink:0">${DOC_ICONS[p.doc_type]||'📄'}</span>`}
            <span class="proj-title">${p.title||p.doc_type||'Документ'}</span>
            ${p.doc_type ? `<span class="proj-meta">${p.doc_type}</span>` : ''}
          </div>`;
        }
      });

      html += `</div>`;
    });

    html += `</div>`;
  });

  if (!inventories.length) {
    html = `<p class="empty-section">Материалы не выбраны для отображения на сайте.</p>`;
  }

  document.getElementById('sections-content').innerHTML = html;
}

function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function scrollToSection(id) {
  document.querySelectorAll('.toc-link').forEach(el => el.classList.toggle('active', el.dataset.section === id));
  if (id === 'bio') { window.scrollTo({top:0,behavior:'smooth'}); return; }
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

// Подсветка TOC при скролле
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id;
      document.querySelectorAll('.toc-link').forEach(el => el.classList.toggle('active', el.dataset.section === id));
    }
  });
}, {rootMargin:'-20% 0px -70% 0px'});

async function openPanel(prodId, invTitle, caseTitle) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-breadcrumb').textContent = `${invTitle} › ${caseTitle}`;
  document.getElementById('panel-body').innerHTML = '<p style="color:#aaa;font-family:sans-serif;font-size:0.85rem">Загрузка…</p>';

  const r = await fetch(`${API}/productions/${prodId}`);
  const d = await r.json();
  const p = d.production;
  const persons = d.persons || [];
  const docs = d.documents || [];
  const photos = docs.filter(doc => isImage(doc.file_path));
  const other = docs.filter(doc => !isImage(doc.file_path));

  const year = getYear(p.premiere_date);
  const crew = [
    p.stage_designer ? `Сценограф: ${p.stage_designer}` : null,
    p.costume_designer ? `Художник по костюмам: ${p.costume_designer}` : null,
    p.composer ? `Композитор: ${p.composer}` : null,
    p.lighting_designer ? `Художник по свету: ${p.lighting_designer}` : null,
  ].filter(Boolean);

  let html = `
    <h2>«${p.title}»</h2>
    <div class="panel-sub">${[p.theater_name, year, p.genre].filter(Boolean).join(' · ')}</div>`;

  if (p.description) html += `<p style="font-size:0.9rem;line-height:1.7;margin-bottom:1rem;color:#444">${p.description}</p>`;

  html += `<hr class="panel-divider">`;

  if (p.playwright) html += `<div class="dl-block"><dt>Пьеса</dt><dd>${p.playwright}</dd></div>`;
  if (p.premiere_date) html += `<div class="dl-block"><dt>Премьера</dt><dd>${new Date(p.premiere_date).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}</dd></div>`;
  if (p.season) html += `<div class="dl-block"><dt>Сезон</dt><dd>${p.season}</dd></div>`;
  if (crew.length) html += `<div class="dl-block"><dt>Постановочная группа</dt><dd style="line-height:1.9">${crew.join('<br>')}</dd></div>`;

  if (persons.length) {
    html += `<hr class="panel-divider"><div class="panel-section-label">Участники (${persons.length})</div>
      <div style="line-height:2.2;margin-top:0.25rem">
        ${persons.map(pe=>`<span style="border-bottom:1px solid #ccc;cursor:default;font-size:0.88rem">${pe.last_name} ${pe.first_name||''}</span>${pe.role_in_production?` <span style="color:#aaa;font-size:0.75rem;font-family:sans-serif">${pe.role_in_production}</span>`:''}`).join(' ')}
      </div>`;
  }

  if (photos.length) {
    html += `<hr class="panel-divider"><div class="panel-section-label">Фотографии (${photos.length})</div>
      <div class="photo-grid">
        ${photos.map(doc=>`<div class="photo-thumb" onclick="openLightbox('${doc.url}')"><img src="${doc.url}" alt="${doc.title||''}" loading="lazy"></div>`).join('')}
      </div>`;
  }

  if (other.length) {
    html += `<hr class="panel-divider"><div class="panel-section-label">Материалы (${other.length})</div>`;
    other.forEach(doc => {
      html += `<div style="display:flex;align-items:center;gap:8px;padding:0.4rem 0.6rem;border:1px solid #e0ddd8;background:white;margin-bottom:3px;font-size:0.83rem">
        <span>${DOC_ICONS[doc.doc_type]||'📄'}</span>
        <span style="flex:1">${doc.title}</span>
        <span style="font-size:0.68rem;color:#aaa;font-family:sans-serif">${doc.doc_type||''}</span>
      </div>`;
    });
  }

  document.getElementById('panel-body').innerHTML = html;

  // Наблюдаем за секциями
  document.querySelectorAll('.section').forEach(el => observer.observe(el));
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

function openLightbox(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePanel(); closeLightbox(); }
});

init().then(() => {
  document.querySelectorAll('.section').forEach(el => observer.observe(el));
});
</script>
</body>
</html>
