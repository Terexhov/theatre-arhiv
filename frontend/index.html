<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Архив театра</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f9f7f4; color: #1a1a1a; min-height: 100vh; }

    header { background: #1a1a1a; color: #f9f7f4; padding: 2rem 2rem 1.5rem; }
    header h1 { font-size: 1.5rem; font-weight: normal; letter-spacing: 0.05em; text-transform: uppercase; }
    header p { font-size: 0.85rem; opacity: 0.5; margin-top: 0.25rem; }

    .search-wrap { padding: 2rem; max-width: 720px; }
    .search-box { display: flex; border: 1px solid #1a1a1a; background: white; }
    .search-box input { flex: 1; border: none; outline: none; padding: 0.85rem 1rem; font-size: 1.1rem; font-family: Georgia, serif; }
    .search-box button { border: none; background: #1a1a1a; color: white; padding: 0 1.5rem; font-size: 0.9rem; cursor: pointer; }
    .search-box button:hover { background: #333; }
    #hint { font-size: 0.8rem; color: #888; margin-top: 0.5rem; padding-left: 0.25rem; }

    .results { max-width: 720px; padding: 0 2rem 3rem; }
    .group-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid #e0ddd8; }
    .card { background: white; border: 1px solid #e0ddd8; padding: 1rem 1.25rem; margin-bottom: 0.5rem; cursor: pointer; transition: border-color 0.15s; }
    .card:hover { border-color: #1a1a1a; }
    .card-title { font-size: 1rem; }
    .card-meta { font-size: 0.8rem; color: #888; margin-top: 0.2rem; font-family: sans-serif; }
    .badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border: 1px solid #ccc; color: #666; font-family: sans-serif; margin-right: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .empty { color: #888; font-size: 0.9rem; padding: 1rem 0; }

    /* Боковая панель */
    .detail { display: none; position: fixed; top: 0; right: 0; width: 480px; height: 100vh; background: white; border-left: 1px solid #e0ddd8; overflow-y: auto; z-index: 100; }
    .detail.open { display: block; }
    .detail-close { position: sticky; top: 0; display: flex; justify-content: flex-end; padding: 0.75rem 1rem; background: white; border-bottom: 1px solid #f0ede8; z-index: 1; }
    .detail-close button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #888; }
    .detail-body { padding: 1.25rem 1.5rem 2rem; }
    .detail h2 { font-size: 1.3rem; font-weight: normal; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #e0ddd8; }
    .dl { margin-bottom: 1rem; }
    .dl dt { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; font-family: sans-serif; margin-bottom: 0.25rem; }
    .dl dd { font-size: 0.95rem; line-height: 1.6; }
    .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; font-family: sans-serif; margin: 1.25rem 0 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid #e0ddd8; }
    .person-avatar { width: 90px; height: 90px; object-fit: cover; border: 1px solid #e0ddd8; margin-bottom: 1rem; display: block; }
    .person-link { border-bottom: 1px solid #ccc; cursor: pointer; font-size: 0.88rem; margin-right: 0.4rem; }
    .person-link:hover { border-bottom-color: #1a1a1a; }

    /* Сетка документов */
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; margin-top: 0.5rem; }
    .doc-thumb {
      cursor: pointer; border: 1px solid #e0ddd8; overflow: hidden;
      position: relative; background: #f9f7f4; transition: border-color 0.15s;
    }
    .doc-thumb:hover { border-color: #1a1a1a; }
    .doc-thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; transition: transform 0.2s; }
    .doc-thumb:hover img { transform: scale(1.04); }
    .doc-thumb .doc-icon-box { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
    .doc-thumb .doc-cap { padding: 3px 5px; font-size: 0.62rem; font-family: sans-serif; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid #f0ede8; }
    .doc-thumb .type-badge { position: absolute; top: 3px; left: 3px; background: rgba(0,0,0,0.55); color: white; font-size: 0.58rem; font-family: sans-serif; padding: 1px 4px; }

    /* Строчные документы (не фото) */
    .doc-row { display: flex; align-items: center; gap: 10px; padding: 0.5rem 0.75rem; border: 1px solid #e0ddd8; background: white; margin-bottom: 4px; cursor: pointer; transition: border-color 0.15s; }
    .doc-row:hover { border-color: #1a1a1a; }
    .doc-row .doc-row-icon { font-size: 1.2rem; flex-shrink: 0; }
    .doc-row .doc-row-title { flex: 1; font-size: 0.85rem; }
    .doc-row .doc-row-type { font-size: 0.72rem; color: #aaa; font-family: sans-serif; }

    /* Модальное окно документа */
    .doc-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 200;
      align-items: center; justify-content: center;
    }
    .doc-modal-overlay.open { display: flex; }

    .doc-modal {
      background: white; width: 720px; max-width: 95vw;
      max-height: 90vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }

    .doc-modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 1.1rem 1.4rem; border-bottom: 1px solid #e0ddd8; gap: 1rem;
      flex-shrink: 0;
    }
    .doc-modal-header h3 { font-size: 1.05rem; font-weight: normal; flex: 1; font-family: Georgia, serif; }
    .doc-modal-header button { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #888; flex-shrink: 0; line-height: 1; }
    .doc-modal-header button:hover { color: #1a1a1a; }

    .doc-modal-body { display: flex; flex: 1; overflow: hidden; }

    .doc-modal-media {
      width: 300px; flex-shrink: 0; background: #111;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .doc-modal-media img {
      width: 100%; height: 100%; object-fit: contain;
      display: block; cursor: zoom-in; max-height: 70vh;
    }
    .doc-modal-media .no-preview {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.5rem; color: rgba(255,255,255,0.35);
    }
    .doc-modal-media .no-preview .big-icon { font-size: 3.5rem; }
    .doc-modal-media .no-preview span { font-size: 0.8rem; font-family: sans-serif; }

    .doc-modal-info {
      flex: 1; padding: 1.25rem 1.4rem; overflow-y: auto;
    }

    .doc-modal-footer {
      padding: 0.85rem 1.4rem; border-top: 1px solid #e0ddd8;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; gap: 1rem;
    }
    .archive-ref {
      font-family: monospace; background: #f0ede8;
      padding: 0.3rem 0.65rem; color: #444; font-size: 0.82rem;
    }
    .btn-file { background: #1a1a1a; color: white; border: none; padding: 0.4rem 1rem; font-size: 0.8rem; cursor: pointer; text-decoration: none; font-family: sans-serif; }
    .btn-file:hover { background: #333; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 99; }
    .overlay.open { display: block; }

    /* Лайтбокс */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 400; align-items: center; justify-content: center; flex-direction: column; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; cursor: zoom-out; }
    .lightbox-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; opacity: 0.65; }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-meta { color: rgba(255,255,255,0.55); font-size: 0.8rem; font-family: sans-serif; margin-top: 0.75rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Театральный архив</h1>
  <p>Фонды, описи, дела, единицы хранения</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="q" placeholder="Начните вводить имя, название спектакля…" autocomplete="off">
    <button onclick="doSearch()">Найти</button>
  </div>
  <div id="hint"></div>
</div>

<div class="results" id="results"></div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detail">
  <div class="detail-close"><button onclick="closeDetail()">✕</button></div>
  <div class="detail-body" id="detail-content"></div>
</div>

<!-- Модальное окно документа -->
<div class="doc-modal-overlay" id="doc-modal-overlay">
  <div class="doc-modal" id="doc-modal">
    <div class="doc-modal-header">
      <h3 id="dm-title">Загрузка…</h3>
      <button onclick="closeDocModal()">✕</button>
    </div>
    <div class="doc-modal-body">
      <div class="doc-modal-media" id="dm-media"></div>
      <div class="doc-modal-info" id="dm-info"></div>
    </div>
    <div class="doc-modal-footer">
      <code class="archive-ref" id="dm-ref"></code>
      <a class="btn-file" id="dm-open" href="#" target="_blank">Открыть файл ↗</a>
    </div>
  </div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-meta" id="lightbox-meta"></div>
</div>

<script>
const API = 'http://vm4099960.firstbyte.club/api';
let debounceTimer;

const IMAGE_EXTS = ['.jpg','.jpeg','.png','.gif','.webp','.tiff'];
const DOC_ICONS = { 'фотография':'🖼','афиша':'🎭','программка':'📋','видеозапись':'🎬','рецензия':'📝','текст пьесы':'📖','другое':'📄' };
const LABELS = { person:'Персоны', production:'Спектакли', document:'Документы' };
const TYPE_RU = { person:'Персона', production:'Спектакль', document:'Документ' };

function isImage(p) { return p && IMAGE_EXTS.some(e => p.toLowerCase().endsWith(e)); }

function formatDate(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'}); }
  catch(e) { return s; }
}

// ========================
// ПОИСК
// ========================

document.getElementById('q').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  const q = this.value.trim();
  if (q.length < 2) { document.getElementById('results').innerHTML=''; document.getElementById('hint').textContent=''; return; }
  document.getElementById('hint').textContent = 'Поиск…';
  debounceTimer = setTimeout(doSearch, 300);
});
document.getElementById('q').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeLightbox(); closeDocModal(); closeDetail(); }
});

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  document.getElementById('hint').textContent = '';
  try {
    const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    renderResults(d.results);
  } catch(e) {
    document.getElementById('results').innerHTML = '<p class="empty">Ошибка подключения к серверу.</p>';
  }
}

function renderResults(results) {
  const c = document.getElementById('results');
  if (!results.length) { c.innerHTML='<p class="empty">Ничего не найдено.</p>'; return; }
  const groups = {};
  results.forEach(r => { if (!groups[r.entity_type]) groups[r.entity_type]=[]; groups[r.entity_type].push(r); });
  let html = '';
  for (const [type, items] of Object.entries(groups)) {
    html += `<div class="group-title">${LABELS[type]||type}</div>`;
    items.forEach(item => {
      html += `<div class="card" onclick="openDetail('${type}',${item.id})">
        <div class="card-title">${item.title}</div>
        <div class="card-meta"><span class="badge">${TYPE_RU[type]||type}</span></div>
      </div>`;
    });
  }
  c.innerHTML = html;
}

// ========================
// БОКОВАЯ ПАНЕЛЬ
// ========================

async function openDetail(type, id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail').classList.add('open');
  document.getElementById('detail-content').innerHTML = '<p style="color:#888;padding:1rem 0">Загрузка…</p>';
  try {
    if (type==='person') {
      const r = await fetch(`${API}/persons/${id}`); const d = await r.json();
      renderPersonDetail(d.person, d.productions, d.documents||[]);
    } else if (type==='production') {
      const r = await fetch(`${API}/productions/${id}`); const d = await r.json();
      renderProductionDetail(d.production, d.persons, d.documents||[]);
    } else if (type==='document') {
      openDocModal(id);
    }
  } catch(e) {
    document.getElementById('detail-content').innerHTML = '<p style="color:#888">Ошибка загрузки.</p>';
  }
}

function renderPersonDetail(p, productions, documents) {
  const avatar = documents.find(d => d.doc_type==='фотография' && isImage(d.file_path));
  const photos = documents.filter(d => isImage(d.file_path));
  const nonPhotos = documents.filter(d => !isImage(d.file_path));

  document.getElementById('detail-content').innerHTML = `
    ${avatar ? `<img src="${avatar.url}" class="person-avatar">` : ''}
    <h2>${p.last_name} ${p.first_name||''} ${p.patronymic||''}</h2>
    ${p.roles?.length ? `<div class="dl"><dt>Роли</dt><dd>${p.roles.join(', ')}</dd></div>` : ''}
    ${p.born ? `<div class="dl"><dt>Дата рождения</dt><dd>${formatDate(p.born)}</dd></div>` : ''}
    ${p.died ? `<div class="dl"><dt>Дата смерти</dt><dd>${formatDate(p.died)}</dd></div>` : ''}
    ${p.bio ? `<div class="dl"><dt>Биография</dt><dd>${p.bio}</dd></div>` : ''}

    ${productions.length ? `
      <div class="section-label">Спектакли</div>
      ${productions.map(pr=>`<div class="card" style="margin-bottom:0.4rem" onclick="openDetail('production',${pr.id})">
        <div class="card-title">${pr.title}</div>
        <div class="card-meta">${pr.season||''} ${pr.role_in_production ? '· '+pr.role_in_production : ''}</div>
      </div>`).join('')}` : ''}

    ${photos.length ? `
      <div class="section-label">Фотографии (${photos.length})</div>
      <div class="doc-grid">${photos.map(d => docThumb(d)).join('')}</div>` : ''}

    ${nonPhotos.length ? `
      <div class="section-label">Документы</div>
      ${nonPhotos.map(d => docRow(d)).join('')}` : ''}
  `;
}

function renderProductionDetail(pr, persons, documents) {
  const photos = documents.filter(d => isImage(d.file_path));
  const nonPhotos = documents.filter(d => !isImage(d.file_path));

  document.getElementById('detail-content').innerHTML = `
    <h2>${pr.title}</h2>
    ${pr.subtitle ? `<div style="color:#888;font-size:0.9rem;margin-bottom:0.75rem;margin-top:-0.5rem">${pr.subtitle}</div>` : ''}
    ${pr.season ? `<div class="dl"><dt>Сезон</dt><dd>${pr.season}</dd></div>` : ''}
    ${pr.playwright ? `<div class="dl"><dt>Драматург</dt><dd>${pr.playwright}</dd></div>` : ''}
    ${pr.genre ? `<div class="dl"><dt>Жанр</dt><dd>${pr.genre}</dd></div>` : ''}
    ${pr.premiere_date ? `<div class="dl"><dt>Премьера</dt><dd>${formatDate(pr.premiere_date)}</dd></div>` : ''}
    ${pr.description ? `<div class="dl"><dt>Описание</dt><dd>${pr.description}</dd></div>` : ''}

    ${persons.length ? `
      <div class="section-label">Участники</div>
      <div style="line-height:2.2;margin-top:0.25rem">
        ${persons.map(p=>`<span class="person-link" onclick="openDetail('person',${p.id})">${p.last_name} ${p.first_name||''}</span>${p.role_in_production?`<span style="color:#aaa;font-size:0.78rem;font-family:sans-serif"> ${p.role_in_production}</span>`:''}`).join(' ')}
      </div>` : ''}

    ${photos.length ? `
      <div class="section-label">Фотографии и афиши (${photos.length})</div>
      <div class="doc-grid">${photos.map(d => docThumb(d)).join('')}</div>` : ''}

    ${nonPhotos.length ? `
      <div class="section-label">Документы</div>
      ${nonPhotos.map(d => docRow(d)).join('')}` : ''}
  `;
}

// Карточка-миниатюра документа — всегда открывает модал
function docThumb(d) {
  return `<div class="doc-thumb" onclick="openDocModal(${d.id})">
    ${isImage(d.file_path)
      ? `<img src="${d.url}" alt="${d.title||''}" loading="lazy">`
      : `<div class="doc-icon-box">${DOC_ICONS[d.doc_type]||'📄'}</div>`}
    <div class="type-badge">${d.doc_type||''}</div>
    <div class="doc-cap">${d.title||''}</div>
  </div>`;
}

// Строчный элемент документа — тоже открывает модал
function docRow(d) {
  return `<div class="doc-row" onclick="openDocModal(${d.id})">
    <span class="doc-row-icon">${DOC_ICONS[d.doc_type]||'📄'}</span>
    <span class="doc-row-title">${d.title}</span>
    <span class="doc-row-type">${d.doc_type}</span>
  </div>`;
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ========================
// МОДАЛЬНОЕ ОКНО ДОКУМЕНТА
// ========================

async function openDocModal(docId) {
  const overlay = document.getElementById('doc-modal-overlay');
  overlay.classList.add('open');

  document.getElementById('dm-title').textContent = 'Загрузка…';
  document.getElementById('dm-media').innerHTML = '';
  document.getElementById('dm-info').innerHTML = '';
  document.getElementById('dm-ref').textContent = '';

  try {
    const r = await fetch(`${API}/documents/${docId}`);
    const data = await r.json();
    const d = data.document;

    document.getElementById('dm-title').textContent = d.title;
    document.getElementById('dm-ref').textContent = d.archive_ref || '—';
    document.getElementById('dm-open').href = d.url || '#';

    // Медиа — клик на фото открывает лайтбокс
    const media = document.getElementById('dm-media');
    if (isImage(d.file_path)) {
      media.innerHTML = `<img src="${d.url}" alt="${d.title}" title="Нажмите для просмотра"
        onclick="openLightbox('${d.url}','${(d.title||'').replace(/'/g,"\\'")}','${(d.author||'').replace(/'/g,"\\'")}','${d.date_created||''}')">`;
    } else {
      const icon = DOC_ICONS[d.doc_type] || '📄';
      media.innerHTML = `<div class="no-preview">
        <div class="big-icon">${icon}</div>
        <span>${d.doc_type||'Документ'}</span>
      </div>`;
    }

    // Информация
    let info = '';

    if (d.doc_type) info += `<div class="dl"><dt>Тип документа</dt><dd>${d.doc_type}</dd></div>`;
    if (d.author)   info += `<div class="dl"><dt>Автор / Фотограф</dt><dd>${d.author}</dd></div>`;
    if (d.date_created) info += `<div class="dl"><dt>Дата</dt><dd>${formatDate(d.date_created)}</dd></div>`;
    if (d.description) info += `<div class="dl"><dt>Описание</dt><dd>${d.description}</dd></div>`;

    if (data.productions.length) {
      info += `<div class="section-label">Спектакли</div>`;
      data.productions.forEach(p => {
        info += `<div class="card" style="margin-bottom:0.4rem" onclick="closeDocModal();setTimeout(()=>openDetail('production',${p.id}),100)">
          <div class="card-title">${p.title}</div>
          <div class="card-meta">${p.season||''}</div>
        </div>`;
      });
    }

    if (data.persons.length) {
      info += `<div class="section-label">Персоны</div>`;
      info += `<div style="line-height:2.4;margin-top:0.25rem">`;
      data.persons.forEach(p => {
        info += `<span class="person-link" onclick="closeDocModal();setTimeout(()=>openDetail('person',${p.id}),100)">${p.last_name} ${p.first_name||''}</span> `;
      });
      info += `</div>`;
    }

    document.getElementById('dm-info').innerHTML = info || '<p style="color:#aaa;font-size:0.85rem">Нет дополнительной информации</p>';

  } catch(e) {
    document.getElementById('dm-title').textContent = 'Ошибка загрузки';
  }
}

function closeDocModal() {
  document.getElementById('doc-modal-overlay').classList.remove('open');
}

// Закрытие по клику на фон
document.getElementById('doc-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDocModal();
});

// ========================
// ЛАЙТБОКС
// ========================

function openLightbox(url, title, author, dateStr) {
  document.getElementById('lightbox-img').src = url;
  const meta = [title, dateStr ? formatDate(dateStr) : null, author ? 'Автор: '+author : null].filter(Boolean).join(' · ');
  document.getElementById('lightbox-meta').textContent = meta;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
</script>
</body>
</html>
