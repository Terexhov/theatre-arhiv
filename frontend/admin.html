<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Архив Боякова — Админка</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1a1a'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='20' fill='%23f9f7f4'>Б</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

    /* Шапка */
    .nav-top {
      background: #1a1a1a; color: white;
      display: flex; align-items: center;
      padding: 0 1rem; height: 46px; gap: 0; flex-shrink: 0;
    }
    .nav-top h1 { font-size: 0.82rem; font-weight: 500; flex: 1; opacity: 0.8; }
    .nav-top a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.75rem; padding: 0 0.75rem; height: 46px; display: flex; align-items: center; }
    .nav-top a:hover { color: white; }

    /* Вкладки описей */
    .inv-tabs {
      background: white; border-bottom: 1px solid #e0ddd8;
      display: flex; overflow-x: auto; flex-shrink: 0;
    }
    .inv-tab {
      padding: 0 1rem; height: 40px; display: flex; align-items: center;
      font-size: 0.78rem; cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent; color: #666;
      flex-shrink: 0;
    }
    .inv-tab:hover { color: #1a1a1a; }
    .inv-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
    .inv-tab .inv-count { font-size: 0.65rem; color: #aaa; margin-left: 5px; }

    /* Основной layout */
    .layout {
      display: flex;
      height: calc(100vh - 86px);
    }

    /* Левая панель — дела */
    .cases-panel {
      width: 240px; flex-shrink: 0;
      background: white; border-right: 1px solid #e0ddd8;
      display: flex; flex-direction: column;
    }
    .cases-header {
      padding: 0.6rem 0.75rem; border-bottom: 1px solid #e0ddd8;
      display: flex; gap: 6px; align-items: center;
    }
    .cases-header span { font-size: 0.7rem; color: #888; flex: 1; }
    .cases-list { overflow-y: auto; flex: 1; }
    .case-item {
      padding: 0.55rem 0.75rem; border-bottom: 1px solid #f0ede8;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .case-item:hover { background: #faf9f7; }
    .case-item.active { background: #f0ede8; }
    .case-item-title { font-size: 0.82rem; flex: 1; }
    .case-item-count { font-size: 0.65rem; color: #aaa; }
    .case-item-del {
      background: none; border: none; cursor: pointer;
      color: #ddd; font-size: 0.75rem; padding: 2px 4px;
      opacity: 0; transition: opacity 0.15s;
    }
    .case-item:hover .case-item-del { opacity: 1; }
    .case-item-del:hover { color: #d00; }

    /* Переключатель «на сайт» */
    .site-toggle { cursor: pointer; display: flex; align-items: center; flex-shrink: 0; }
    .site-toggle input { display: none; }
    .site-toggle-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid #ccc; background: white;
      transition: all 0.15s; flex-shrink: 0;
    }
    .site-toggle input:checked + .site-toggle-dot {
      background: #1a7a3a; border-color: #1a7a3a;
    }

    /* Фильтр по годам */
    .year-filters { padding: 0.4rem 0.75rem; border-bottom: 1px solid #e0ddd8; display: flex; flex-wrap: wrap; gap: 4px; }
    .year-chip {
      font-size: 0.62rem; padding: 2px 6px; border: 1px solid #ddd;
      cursor: pointer; color: #666; font-family: monospace;
      background: white; transition: all 0.12s;
    }
    .year-chip:hover { border-color: #999; color: #1a1a1a; }
    .year-chip.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }

    /* Группа в деле */
    .case-group-label {
      font-size: 0.6rem; color: #aaa; font-family: monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 60px;
    }

    /* Заголовок группы в списке */
    .group-header {
      padding: 0.3rem 0.75rem 0.15rem;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #aaa; font-family: sans-serif; background: #f9f8f6;
      border-bottom: 1px solid #f0ede8;
    }

    /* Новое дело */
    .new-case-form {
      padding: 0.6rem 0.75rem; border-top: 1px solid #e0ddd8;
      display: flex; gap: 5px;
    }
    .new-case-form input {
      flex: 1; border: 1px solid #ddd; padding: 0.32rem 0.5rem;
      font-size: 0.78rem; outline: none;
    }

    /* Правая панель — содержимое дела */
    .content-panel { flex: 1; overflow-y: auto; padding: 1.1rem 1.4rem; }
    .content-panel h2 { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.85rem; padding-bottom: 0.6rem; border-bottom: 1px solid #e0ddd8; display: flex; align-items: center; gap: 10px; }
    .content-panel h2 .case-ref { font-size: 0.7rem; font-family: monospace; color: #aaa; font-weight: normal; }

    /* Форма */
    .field { margin-bottom: 0.7rem; }
    .field label { display: block; font-size: 0.63rem; color: #888; margin-bottom: 0.18rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input, .field textarea, .field select { width: 100%; border: 1px solid #ddd; padding: 0.38rem 0.55rem; font-size: 0.83rem; outline: none; font-family: sans-serif; background: white; }
    .field textarea { resize: vertical; min-height: 65px; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: #1a1a1a; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.7rem; }

    .btn { background: #1a1a1a; color: white; border: none; padding: 0.35rem 0.85rem; font-size: 0.78rem; cursor: pointer; }
    .btn:hover { background: #333; }
    .btn-sm { background: none; border: 1px solid #ccc; color: #555; padding: 0.25rem 0.6rem; font-size: 0.7rem; cursor: pointer; }
    .btn-sm:hover { border-color: #999; }
    .btn-danger { border-color: #d00 !important; color: #d00 !important; }
    .btn-outline { background: none; border: 1px solid #1a1a1a; color: #1a1a1a; padding: 0.35rem 0.85rem; font-size: 0.78rem; cursor: pointer; }
    .btn-outline:hover { background: #f5f5f3; }

    .form-actions { display: flex; gap: 6px; margin-top: 0.85rem; padding-top: 0.7rem; border-top: 1px solid #e0ddd8; flex-wrap: wrap; }

    .section-title { font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin: 1rem 0 0.45rem; padding-bottom: 0.28rem; border-bottom: 1px solid #e0ddd8; }

    /* Теги участников */
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 0.45rem; }
    .tag { display: inline-flex; align-items: center; gap: 4px; border: 1px solid #ddd; padding: 0.15rem 0.45rem; font-size: 0.7rem; background: white; }
    .tag button { background: none; border: none; cursor: pointer; color: #bbb; line-height: 1; padding: 0; font-size: 0.75rem; }
    .tag button:hover { color: #d00; }
    .add-row { display: flex; gap: 5px; }
    .add-row select, .add-row input { flex: 1; border: 1px solid #ddd; padding: 0.35rem 0.5rem; font-size: 0.78rem; outline: none; min-width: 0; }

    /* Мультиселект */
    .multiselect { border: 1px solid #ddd; max-height: 95px; overflow-y: auto; background: white; }
    .multiselect label { display: flex; align-items: center; gap: 6px; padding: 0.22rem 0.55rem; font-size: 0.78rem; cursor: pointer; border-bottom: 1px solid #f5f4f2; }
    .multiselect label:hover { background: #faf9f7; }

    /* Документы */
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 5px; margin-bottom: 0.6rem; }
    .doc-card { border: 1px solid #e0ddd8; background: white; cursor: pointer; overflow: hidden; position: relative; }
    .doc-card:hover { border-color: #999; }
    .doc-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .doc-card .doc-icon { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #f5f4f2; }
    .doc-card .doc-label { padding: 2px 4px; font-size: 0.58rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid #f0ede8; }
    .doc-card .doc-badge { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.55); color: white; font-size: 0.54rem; padding: 1px 3px; }
    .doc-card .doc-del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.55); color: white; border: none; width: 17px; height: 17px; cursor: pointer; font-size: 0.58rem; display: flex; align-items: center; justify-content: center; opacity: 0; }
    .doc-card:hover .doc-del { opacity: 1; }

    /* Загрузка */
    .upload-panel { border: 1px solid #e0ddd8; background: #fafaf9; padding: 0.75rem; margin-top: 0.6rem; }
    .upload-panel h4 { font-size: 0.72rem; font-weight: 500; margin-bottom: 0.55rem; color: #444; }
    .drop-zone { border: 1.5px dashed #ccc; padding: 0.75rem; text-align: center; cursor: pointer; margin-bottom: 0.55rem; background: white; }
    .drop-zone:hover, .drop-zone.drag { border-color: #1a1a1a; }
    .drop-zone p { font-size: 0.72rem; color: #888; }
    .drop-zone input { display: none; }
    .selected-file { font-size: 0.72rem; color: #444; margin-top: 0.28rem; font-style: italic; }
    .progress { height: 3px; background: #e0ddd8; margin-top: 0.38rem; display: none; }
    .progress .fill { height: 100%; background: #1a1a1a; width: 0; transition: width 0.3s; }

    .empty-state { color: #aaa; font-size: 0.8rem; padding: 1.5rem; text-align: center; }

    .toast { position: fixed; bottom: 1rem; right: 1rem; background: #1a1a1a; color: white; padding: 0.55rem 0.9rem; font-size: 0.78rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; max-width: 280px; }
    .toast.show { opacity: 1; }
    .toast.err { background: #c00; }

    /* Мобильная адаптация */
    @media (max-width: 700px) {
      .layout { flex-direction: column; height: auto; }
      .cases-panel { width: 100%; height: 180px; border-right: none; border-bottom: 1px solid #e0ddd8; }
      .content-panel { padding: 0.85rem; }
      .row2, .row3 { grid-template-columns: 1fr; }
      .inv-tab { font-size: 0.72rem; padding: 0 0.65rem; }
      .nav-top h1 { font-size: 0.76rem; }
    }
  </style>
</head>
<body>

<div class="nav-top">
  <h1>Архив Боякова — Админка</h1>
  <a href="index.html" target="_blank">→ Сайт</a>
</div>

<div class="inv-tabs" id="inv-tabs">
  <div style="color:#aaa;font-size:0.78rem;padding:0 1rem;display:flex;align-items:center">Загрузка…</div>
</div>

<div class="layout">
  <div class="cases-panel">
    <div class="cases-header">
      <span id="cases-inv-label">Дела</span>
      <button class="btn-sm" onclick="showNewItemForm()">+ Добавить</button>
    </div>
    <div class="year-filters" id="year-filters" style="display:none"></div>
    <div class="cases-list" id="cases-list">
      <div class="empty-state">Выберите опись</div>
    </div>
    <div class="new-case-form">
      <input id="new-case-input" placeholder="Новое дело…" onkeydown="if(event.key==='Enter')createCase()" style="flex:1.5">
      <input id="new-case-group" placeholder="Группа…" onkeydown="if(event.key==='Enter')createCase()" style="flex:1">
      <button class="btn" onclick="createCase()">+</button>
    </div>
  </div>
  <div class="content-panel" id="content-panel">
    <div class="empty-state">Выберите опись и дело слева</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://178.253.38.120/api';

// Состояние
let allInventories = [];
let currentInvId = null;
let currentCaseId = null;
let currentCaseData = null;
let allPersons = [];
let allProductions = [];
let docTypes = [];
let casesByInv = {};
let uploadFile = null;
let activeYear = null;

const IMAGE_EXTS = ['.jpg','.jpeg','.png','.gif','.webp','.tiff'];
const DOC_ICONS = {'фотография':'🖼','афиша':'🎭','программка':'📋','видеозапись':'🎬','рецензия':'📝','текст пьесы':'📖','договор':'📑','интервью':'🎙','лекция':'📚','публикация':'📰','концепция':'💡','черновик':'✏️','переписка':'✉️','другое':'📄'};
function isImage(p) { return p && IMAGE_EXTS.some(e => p.toLowerCase().endsWith(e)); }

// ========================
// ИНИЦИАЛИЗАЦИЯ
// ========================

async function init() {
  const [inv, pe, pr, dt] = await Promise.all([
    fetch(`${API}/archive/inventories`).then(r=>r.json()),
    fetch(`${API}/persons?limit=200`).then(r=>r.json()),
    fetch(`${API}/productions?limit=200`).then(r=>r.json()),
    fetch(`${API}/doc-types`).then(r=>r.json()),
  ]);
  allInventories = inv;
  allPersons = pe;
  allProductions = pr;
  docTypes = dt;
  renderInvTabs();
  if (inv.length) selectInventory(inv[0].id);
}

function renderInvTabs() {
  document.getElementById('inv-tabs').innerHTML = allInventories.map(i => `
    <div class="inv-tab" id="inv-tab-${i.id}" onclick="selectInventory(${i.id})">
      ${i.title}
      <span class="inv-count">${i.cases_count}</span>
    </div>`).join('');
}

async function selectInventory(invId) {
  currentInvId = invId;
  currentCaseId = null;
  activeYear = null;
  document.querySelectorAll('.inv-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`inv-tab-${invId}`)?.classList.add('active');
  const inv = allInventories.find(i => i.id === invId);
  document.getElementById('cases-inv-label').textContent = inv ? `Оп.${inv.number}` : 'Дела';
  document.getElementById('content-panel').innerHTML = '<div class="empty-state">Выберите дело</div>';
  await loadCases(invId);
}

async function loadCases(invId) {
  const r = await fetch(`${API}/archive/inventories/${invId}`);
  const d = await r.json();
  casesByInv[invId] = d.cases || [];
  renderYearFilters(casesByInv[invId]);
  renderCases(casesByInv[invId]);
  const tab = document.getElementById(`inv-tab-${invId}`);
  if (tab) {
    const countEl = tab.querySelector('.inv-count');
    if (countEl) countEl.textContent = casesByInv[invId].length;
  }
}

function renderYearFilters(cases) {
  const yf = document.getElementById('year-filters');
  const years = new Set();
  cases.forEach(c => {
    if (c.effective_date_from) years.add(new Date(c.effective_date_from).getFullYear());
    if (c.effective_date_to) years.add(new Date(c.effective_date_to).getFullYear());
    if (c.date_from) years.add(new Date(c.date_from).getFullYear());
    if (c.date_to) years.add(new Date(c.date_to).getFullYear());
  });
  if (years.size < 2) { yf.style.display = 'none'; yf.innerHTML = ''; return; }
  const sorted = Array.from(years).sort();
  yf.style.display = 'flex';
  yf.innerHTML = `<span class="year-chip ${activeYear===null?'active':''}" onclick="filterYear(null)">Все</span>` +
    sorted.map(y => `<span class="year-chip ${activeYear===y?'active':''}" onclick="filterYear(${y})">${y}</span>`).join('');
}

function filterYear(year) {
  activeYear = year;
  renderYearFilters(casesByInv[currentInvId] || []);
  renderCases(casesByInv[currentInvId] || []);
}

function renderCases(allCases) {
  const list = document.getElementById('cases-list');
  let cases = allCases;
  if (activeYear !== null) {
    cases = allCases.filter(c => {
      const from = c.effective_date_from ? new Date(c.effective_date_from).getFullYear() : (c.date_from ? new Date(c.date_from).getFullYear() : null);
      const to = c.effective_date_to ? new Date(c.effective_date_to).getFullYear() : (c.date_to ? new Date(c.date_to).getFullYear() : null);
      return from === activeYear || to === activeYear;
    });
  }
  if (!cases.length) { list.innerHTML = '<div class="empty-state">Нет дел</div>'; return; }

  // Группировка по project_group
  const groups = {};
  cases.forEach(c => {
    const g = c.project_group || '';
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });

  let html = '';
  const keys = Object.keys(groups).sort((a,b) => a === '' ? 1 : b === '' ? -1 : a.localeCompare(b, 'ru'));
  keys.forEach(g => {
    if (g) html += `<div class="group-header">${g}</div>`;
    groups[g].forEach(c => {
      html += `
        <div class="case-item ${c.id===currentCaseId?'active':''}" onclick="selectCase(${c.id})">
          <div class="case-item-title">${c.title}</div>
          <span class="case-item-count">${c.units_count}</span>
          <label class="site-toggle" title="Показывать на сайте" onclick="event.stopPropagation()">
            <input type="checkbox" ${c.show_on_site?'checked':''} onchange="toggleShowOnSite(${c.id},this.checked)">
            <span class="site-toggle-dot"></span>
          </label>
          ${c.units_count === 0 ? `<button class="case-item-del" onclick="event.stopPropagation();deleteCase(${c.id})" title="Удалить пустое дело">✕</button>` : ''}
        </div>`;
    });
  });
  list.innerHTML = html;
}

async function toggleShowOnSite(caseId, show) {
  await fetch(`${API}/archive/cases/${caseId}/show-on-site?show=${show}`, {method:'PATCH'});
  toast(show ? 'Добавлено на сайт' : 'Убрано с сайта');
}

async function createCase() {
  const input = document.getElementById('new-case-input');
  const groupInput = document.getElementById('new-case-group');
  const title = input.value.trim();
  const project_group = groupInput ? groupInput.value.trim() || null : null;
  if (!title || !currentInvId) { toast('Введите название и выберите опись', true); return; }
  const r = await fetch(`${API}/archive/cases`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ inventory_id: currentInvId, title, project_group })
  });
  const data = await r.json();
  toast('Дело создано');
  input.value = '';
  if (groupInput) groupInput.value = '';
  delete casesByInv[currentInvId];
  await loadCases(currentInvId);
  // Обновляем описи
  const inv = await fetch(`${API}/archive/inventories`).then(r=>r.json());
  allInventories = inv;
  renderInvTabs();
  document.getElementById(`inv-tab-${currentInvId}`)?.classList.add('active');
}

async function deleteCase(caseId) {
  if (!confirm('Удалить пустое дело?')) return;
  await fetch(`${API}/archive/cases/${caseId}`, {method:'DELETE'});
  toast('Дело удалено');
  if (currentCaseId === caseId) {
    currentCaseId = null;
    document.getElementById('content-panel').innerHTML = '<div class="empty-state">Выберите дело</div>';
  }
  delete casesByInv[currentInvId];
  await loadCases(currentInvId);
}

async function selectCase(caseId) {
  currentCaseId = caseId;
  renderCases(casesByInv[currentInvId] || []);
  const r = await fetch(`${API}/archive/cases/${caseId}`);
  const d = await r.json();
  currentCaseData = d;
  renderCaseContent(d);
}

// ========================
// СОДЕРЖИМОЕ ДЕЛА
// ========================

function renderCaseContent(d) {
  const c = d.case;
  const units = d.units || [];
  const inv = allInventories.find(i => i.id === currentInvId);
  const ref = `${c.fund_code} Оп.${c.inv_number} Д.${c.number}`;

  // Определяем тип дела по описи
  const invNum = inv ? parseInt(inv.number) : 0;

  let html = `<h2>${c.title} <span class="case-ref">${ref}</span></h2>`;

  if (c.description) html += `<p style="font-size:0.85rem;color:#555;margin-bottom:0.85rem;line-height:1.5">${c.description}</p>`;

  // Добавить запись в зависимости от описи
  if (invNum === 1) {
    // Театральные проекты — показываем форму спектакля или список
    html += renderProjectsInCase(units, caseId=c.id);
  } else if (invNum === 2) {
    // Персоналии
    html += renderPersonsInCase(units, caseId=c.id);
  } else {
    // Остальные — документы
    html += renderDocsInCase(units, c.id);
  }

  document.getElementById('content-panel').innerHTML = html;
}

function renderProjectsInCase(units, caseId) {
  // Ищем спектакли привязанные к этому делу
  const linkedProds = allProductions.filter(p => p.inventory_case_id === caseId);
  let html = '';

  if (linkedProds.length) {
    html += `<div class="section-title">Спектакли и проекты</div>`;
    html += linkedProds.map(p => `
      <div style="display:flex;align-items:center;gap:8px;padding:0.45rem 0.75rem;border:1px solid #e0ddd8;background:white;margin-bottom:3px;cursor:pointer" onclick="openProductionForm(${p.id})">
        <div style="flex:1">
          <div style="font-size:0.85rem">«${p.title}»</div>
          <div style="font-size:0.7rem;color:#aaa">${p.theater_name||''} ${p.season ? '· '+p.season : ''}</div>
        </div>
        <span style="font-size:0.7rem;color:#aaa">→</span>
      </div>`).join('');
  }

  html += `<div style="margin-top:0.75rem;display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn" onclick="openProductionForm(0,${caseId})">+ Новый спектакль</button>

function renderPersonsInCase(units, caseId) {

function renderDocsInCase(units, caseId) {
  const docs = units.filter(u => u.object_type === 'document' && u.doc_id);
  let html = `<div class="section-title">Документы (${docs.length})</div>`;

  if (docs.length) {
    html += `<div class="doc-grid">`;
    docs.forEach(u => {
      const icon = DOC_ICONS[u.doc_type] || '📄';
      html += `<div class="doc-card" onclick="openDocForm(${u.doc_id})">
        ${isImage(u.file_path) ? `<img src="${u.url}" alt="">` : `<div class="doc-icon">${icon}</div>`}
        <div class="doc-badge">${u.doc_type||''}</div>
        <button class="doc-del" onclick="event.stopPropagation();deleteDocument(${u.doc_id})">✕</button>
        <div class="doc-label">${u.doc_title||u.title||''}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<button class="btn-outline" onclick="showDocUpload(${caseId})">+ Добавить документ</button>`;
  html += `<div id="doc-upload-area"></div>`;
  return html;
}

async function saveProduction(id, caseId) {

  };

async function updateDocument(id) {
  const formData = new FormData();
  formData.append('title', document.getElementById('f-title').value.trim());
  formData.append('doc_type', document.getElementById('f-doctype').value);
  formData.append('author', document.getElementById('f-author').value.trim());
  formData.append('date_created', document.getElementById('f-date').value);
  formData.append('source', document.getElementById('f-source').value.trim());
  formData.append('is_original', document.getElementById('f-original').value);
  formData.append('description', document.getElementById('f-desc').value.trim());
  formData.append('production_ids', JSON.stringify(getChecked('prod-checks')));

async function deleteDocument(id) {

      <div class="row2" style="margin-top:0.5rem">
        <div class="field"><label>Название</label><input id="u-title" placeholder="Оставьте пустым"></div>
        <div class="field"><label>Тип</label><select id="u-type">${typeOptions}</select></div>
      </div>
      <div class="row2">
        <div class="field"><label>Автор</label><input id="u-author"></div>
        <div class="field"><label>Дата</label><input type="date" id="u-date"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Источник</label><input id="u-source"></div>
        <div class="field"><label>Подлинность</label>
          <select id="u-original"><option value="true">Оригинал</option><option value="false">Копия</option></select>
        </div>

    </div>`;

function selectFile(file) {
  uploadFile = file;
  const el = document.getElementById('sel-file-name');
  if (el) el.textContent = file ? file.name : 'Файл не выбран';
}

function handleDrop(event) {
  event.preventDefault();
  document.getElementById('drop-z')?.classList.remove('drag');
  selectFile(event.dataTransfer.files[0]);
}

async function uploadDocument(entityType, entityId, caseId) {
  if (!uploadFile) { toast('Выберите файл', true); return; }
  const prog = document.getElementById('u-prog');
  const fill = document.getElementById('u-fill');
  if (prog) { prog.style.display='block'; fill.style.width='40%'; }

  const prodIds = entityType==='production' ? [entityId] : getChecked('u-prods');
  const persIds = entityType==='person' ? [entityId] : getChecked('u-pers');

  // Определяем опись по текущей вкладке
  const inv = allInventories.find(i => i.id === currentInvId);
  const invId = inv ? inv.id : '';

  const formData = new FormData();
  formData.append('file', uploadFile);
  formData.append('title', document.getElementById('u-title').value.trim() || uploadFile.name.replace(/\.[^.]+$/,''));
  formData.append('doc_type', document.getElementById('u-type').value);
  formData.append('author', document.getElementById('u-author').value.trim());
  formData.append('date_created', document.getElementById('u-date').value);
  formData.append('source', document.getElementById('u-source').value.trim());
  formData.append('is_original', document.getElementById('u-original').value);
  formData.append('description', document.getElementById('u-desc').value.trim());
  formData.append('production_ids', JSON.stringify(prodIds));
  formData.append('person_ids', JSON.stringify(persIds));
  formData.append('inventory_id', invId);
  formData.append('case_id', currentCaseId || caseId || '');

  const res = await fetch(`${API}/upload/document`, {method:'POST', body:formData});
  const data = await res.json();

  if (fill) { fill.style.width='100%'; setTimeout(()=>{ if(prog) prog.style.display='none'; },500); }

  if (data.status==='ok') {
    toast(`Загружено · ${data.archive_ref||''}`);
    uploadFile = null;


    await selectCase(currentCaseId);
  } else {
    toast('Ошибка загрузки', true);
  }
}

// ========================
// УТИЛИТЫ
// ========================

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
